# Receives OTLP (HTTP on 4318) from the app and exposes Prometheus scrape on 8889 for Grafana.
# Run: docker compose --profile observability up -d otel-collector grafana
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
